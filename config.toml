baseURL = "https://girigiribauer.com/"
languageCode = "ja-jp"
title = "ばうあーろぐ"
enableRobotsTXT = true
enableEmoji = true

# Preserve legacy URL structure
[permalinks]
tech = "/tech/:contentbasename/"
biz = "/biz/:contentbasename/"
misc = "/misc/:year:month:day/"

[taxonomies]
tag = "tags"

[markup.goldmark.renderer]
unsafe= true

[params]
    author = "girigiribauer"
    description = "IT / Web に関するメモ、あるいは Twentyfour あるいは人生の diff"
    images = ["/img/ogimage.png"]
    twitter = "@girigiribauer"
    # standard.site (AT Protocol) 連携用。倉庫(リポジトリ)の DID
    standardSiteDid = "did:plc:tsvcmd72oxp47wtixs4qllyi"

# standard.site 用の記事一覧 JSON を /standardsite.json として出力する
[outputs]
home = ["HTML", "RSS", "standardsite"]

[outputFormats.standardsite]
mediaType = "application/json"
baseName = "standardsite"
isPlainText = true
notAlternative = true


